cardstats:cat /var/log/wireless.cardstats 2>/dev/null
cert_list:ls /etc/jbm/certificates | grep -v README_WARNING
cfgsync:/home/httpd/jbmconfig/bin/cfgsync.sh -s
debugdatalog:[ -f /var/log/datalogs.log ] && cat /var/log/datalogs.log || echo "No log found"
debugsmslog: [ -f /var/log/smscmd.log ] && cat /var/log/smscmd.log || echo "No log found"
df:df
errorjs:awk '{match($0, /"(.*)"/); print substr($0, RSTART+1, RLENGTH-2)}' /tmp/gaufiles/error.js
factoryreset:system_factoryreset -n
get_ttyports:/home/httpd/jbmconfig/bin/get_ttyports prefix=ttyS raw=y
getintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,br,gre,ipip,tunl,ppp,wifi,wwan static=None --parseable
gwlnx_status:/home/httpd/jbmconfig/bin/getprocstatus --id=g_app --text='GWLNX is'
hostapd:cat /etc/hostapd/hostapd.conf
ifconfig:ifconfig
isram:[ 1 == "$(/bin/ismodbusenabled.sh 2>&1 | awk -F'=' '{print $2}')" ] && printf 1 || printf 0
pppoeintf:/home/httpd/jbmconfig/bin/getintfs filter=eth --parseable
pipfallbackgetintf:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,tunl static=ppp0,wwan0 --parseable
sdcmount:mount | grep --quiet sdcard && printf 'y'
sipfallbackgetintf:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,tunl static=ppp0,wwan0,vrrp --parseable
snswrpt:/bin/snswrpt
ipfallbackgetscript:/home/httpd/jbmconfig/bin/getscriptlist '/GAUCfg/ipfallback/pcmd/text()' '/etc/jbm/bin_ipfb' --parseable
pingalivegetscript:/home/httpd/jbmconfig/bin/getscriptlist '/GAUCfg/pingalive/command/text()' '/etc/jbm/bin_pingalive' --parseable
pingalivegetintf:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,ipsec,ppp,tap,tun,br static=ppp0,wwan0 predefs=y noplus=y --parseable
iptransgetintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth --parseable
iwinfofreq:/usr/sbin/iw phy0 info | grep -A 14 Frequencies
get_dyndnsinterface:/home/httpd/jbmconfig/bin/getintfs filter=eth static=ppp0,wwan0,iptrans predefs=yes --parseable
get_svminterface:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,tun,ipip,ppp,wwan static=None,ppp0,wwan0 --parseable
arpcache:(arp -v)
featurecodes:cat /proc/feature_codes/all
summary:(echo ; snswrpt -e 0; echo ; snswrpt -e 1)
details:(echo ; ip addr show; echo ; snswrpt)
multicast:(ip maddr show)
pingintf:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,tun,ppp,wwan aliases=y getips=y --parseable
policy:(showroutes)
standard:(route -n)
defined:(cat /etc/sysconfig/static-routes | sed /#/d)
tcponly:(netstat -antp)
conntrack:(cat /proc/net/nf_conntrack)
allsocket:(netstat -anp)
fwa:chkconfig --list | grep iptables | grep on
fwr:iptables -L | grep TRAFFIC
modbus_running:if /sbin/pidof sxserial_client &> /dev/null; then echo -n yes; else echo -n no; fi
modbus_serials:grep -o 'device="ttyS[0-9]"' /etc/stacfg/modbus.xml | grep -o 'ttyS[0-9]'
sysprocess:ps -auxwf
sysservices:chkconfig --list
systemfree:free
tracertintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,tun,ppp,wwan aliases=y --parseable
update:cat /etc/jbm/updates.txt || echo
version:cat /etc/version
modbusenabled:/bin/ismodbusenabled.sh &>/dev/null; echo -n $?
iseth1available:ifconfig | grep -q 'eth1'; echo -n $?
isvlanavailable:skvs get FC_SWMODE_SEP
diagintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,ppp,tun,wlan aliases=y getips=y --parseable
eth1intfs:/home/httpd/jbmconfig/bin/getintfs filter=eth1 raw=y
curgwip:cat /etc/sysconfig/network | grep GATEWAY= | sed 's/GATEWAY=//'
curgwdev:cat /etc/sysconfig/network | grep GATEWAYDEV= | sed 's/GATEWAYDEV=//'
reboot:reboot
prepfs:/home/httpd/jbmconfig/bin/prepfs.sh &>/dev/null
getacllist:/home/httpd/jbmconfig/cgi-bin/getacllist format=parsable
dmzgetintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,tunl static=All%20Trusted,Any,ppp0,wwan0 predefs=y --parseable
vrrpintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,br,wifi --parseable
timezones:/home/httpd/jbmconfig/bin/getzones --parsable
acllist:/home/httpd/jbmconfig/cgi-bin/getacllist format=display
getfwintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,ipsec,ppp,tap,tun static=ppp0,wwan0 predefs=y --parseable
staticroutesintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipip,tap,tunl,br static=ppp0,wwan0 predefs=y noplus=y --parseable
sslintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipsec,ppp,wwan static=Any predefs=y --parseable
getstationlist:/home/httpd/jbmconfig/bin/getstationlist --parseable
cellmodem_cpin:/bin/cat /etc/jbm/wireless/cellmodem_cpin
installedmodem:/bin/cat /var/log/cell_modem
sslserverstat:/home/httpd/jbmconfig/bin/getprocstatus --id=sslserver --text='SSL Server'
sslclientstat:/home/httpd/jbmconfig/bin/getprocstatus --id=sslclient --text='SSL Client'
getsslintfs:/home/httpd/jbmconfig/bin/getintfs filter=eth,gre,ipsec,ppp,wwan static=Any predefs=y --parseable
getsslcert:/home/httpd/jbmconfig/bin/getsslcertlist --parseable
cfgfile:/home/httpd/jbmconfig/bin/getcfglist --parseable
freestatus:free
getdhcprelayintf:/home/httpd/jbmconfig/bin/getintfs filter=eth noplus=y --parseable
getmodemstat:/home/httpd/jbmconfig/bin/getmodemInfo
celldiscstatus:/home/httpd/jbmconfig/bin/celldiscstatus
health:/home/httpd/jbmconfig/bin/health_monitor
gausysinit:/home/httpd/jbmconfig/bin/gau_sysinit.sh &>/dev/null
getipseccert:/home/httpd/jbmconfig/bin/getcertlist ipseccert --parseable
getipseckey:/home/httpd/jbmconfig/bin/getcertlist ipseckey --parseable
joblist:ls -al /etc/jobcontrol/* | grep -v " \.$\| \.\.$"
getimpjob:/home/httpd/jbmconfig/bin/getimpjoblist
ipv6file:ls /proc/net/if_inet6 &>/dev/null; echo -n $?
lanintf:ifconfig | grep "Link encap" | awk '{print $1}'
eventstatus:/bin/cat /var/log/events.status || echo no file
eventgetscript:/home/httpd/jbmconfig/bin/getscriptlist ' ' '/etc/eventd/actions' --parseable
svmcheckin:echo -e '5\x3aUser triggered from GUI' > /tmp/gmu.gau && mv /tmp/gmu.gau /tmp/gmu_trigger
getgwlnx:pidof gwlnx &>/dev/null; echo $?
getcrstatus: ps ax | grep "crimson-access.pl" | grep -v grep &>/dev/null; echo $?
crimsonscan:/bin/cat /etc/crimson/crimsonscan.txt || echo nofile
gettimefile:/bin/cat /tmp/timefile || echo nofile
getwifissid:/usr/sbin/iw wlan0 info | grep "ssid"
geteth0addr:ifconfig eth0 | grep 'inet '| awk '{print $2}'
eventslog:/bin/cat /var/log/events.log || echo nofile
startlockdown:/bin/touch /tmp/gps_lockdown
startmonitor:/bin/touch /tmp/gps_monitor
emailstat:ps -aux | grep email.watch | grep -v grep &>/dev/null; echo -n $?
subsystems:cat /home/httpd/jbmconfig/conf/config.xml | grep " subsystem=" | sed 's/"//g' | sed 's/[<|>]//g' | awk '{print $2}' | sed 's/subsystem=//g'
nemostatus:/bin/cat /var/log/nemo.status || echo nofile
nemointfs:/home/httpd/jbmconfig/bin/getintfs filter=eth aliases=y --parseable
oem:cat /home/httpd/jbmconfig/txt/OEM.txt 2>/dev/null
gwlnxsms:/home/httpd/jbmconfig/bin/checkgwlnx_sms
stratonstatus: ps ax | grep "straton-access.pl" | grep -v grep &>/dev/null; echo $?
stratontimefile:/bin/cat /tmp/stratontimefile || echo nofile
getramqttcert:/home/httpd/jbmconfig/bin/getcertlist ramqttcert --parseable
getramqttkey:/home/httpd/jbmconfig/bin/getcertlist ramqttkey --parseable
getramqttca:/home/httpd/jbmconfig/bin/getcertlist ramqttca --parseable
smscmd:ps -aux | grep smscmd | grep -v grep &>/dev/null; echo -n $?
killsms:/usr/bin/killall jbmcontrol &>/dev/null; /bin/cp -f /home/jbmgatew/unit.cfg.orig /home/jbmgatew/unit.cfg
nemoclient:ls /sbin/nemo_client &>/dev/null; echo -n $?
cellforcedonoff:cellmodemconnect.pl status | grep "Forced connection" | grep -o "On\|Off"
