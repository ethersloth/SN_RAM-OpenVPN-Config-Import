<form id="gps-form" class="form-horizontal">
	<!--ko template: {name:'title-template',data:'GPS Settings'}--><!--/ko-->
	<!--ko template: {name:'h4-template',data:'Last Fix Status'}--><!--/ko-->
	<!-- ko if: GpsUnAvailable -->
		<p style="color: red; text-align: center">
			GPS is not available because the cellular modem is powered off
		</p>
	<!-- /ko -->
	<!--ko if: haveFix-->
	<table class="gw-auto-margin gw-status-table gw-st40" style="width: 500px" name="lastFixStatus">
		<tr>
			<td>GPS Source</td>
			<td data-bind="text: dispgpssource"></td>
		</tr>
		<tr>
			<td>Latitude</td>
			<td data-bind="text: dispgpslat"></td>
		</tr>
		<tr>
			<td>Longitude</td>
			<td data-bind="text: dispgpslon"></td>
		</tr>
		<tr>
			<td>Fix</td>
			<td data-bind="text: dispvalid"></td>
		</tr>
		<tr>
			<td>GMT Time</td>
			<td data-bind="text: dispgpstime"></td>
		</tr>
		<tr>
			<td>GeoFence Engine State</td>
			<td>
				<span data-bind="text: engineState"></span>
				<a tabindex="-1" data-bind="help: {'title': 'GeoFence Engine State', 'link': '/h_gps_enginestate.html'}" class="btn"><i class="icon-question-sign"></i></a>
			</td>
		</tr>
	</table>
	<br />
	<div style="text-align: center">
		<a class="btn" target="_blank" data-bind="attr:{href: gmaphref}">View in Google Maps</a>
	</div>
	<br />
	<!-- /ko -->
	<!--ko ifnot: haveFix-->
	<p style="text-align: center">
		No location fix available.<br />
		Please check antenna or GPS source.
	</p>
	<!-- /ko -->
	<div style="text-align: center">
		<button type="button" class="btn btn-primary" data-bind="click: startLockdown">Start GeoFence Lockdown</button>
		<button type="button" class="btn btn-primary" data-bind="click: startMonitor">Start Monitor Only Mode</button>
	</div>
	<br />
