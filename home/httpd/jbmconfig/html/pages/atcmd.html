<div class="gw-row"><div class="gw-auto-margin" style="width: 375px">
	<a data-bind="click: showHelp" tabindex="-1" class="btn" style="float: right; margin-top: 6px"><i class="icon-question-sign"></i></a>
	<h3>AT Command Interface</h3>
</div></div>
<hr />
<div class="gw-row">
	<p style="color: red" data-bind="text: warningMessage"></p>
</div>
<table style="width: 100%">
	<tbody>
		<tr>
			<td style="text-align: right">Command List</td>
			<td style="width: 700px">
				<!-- ko with: at_cmd_in -->
					<div style="text-align: center; margin-top: 10px">
						<textarea style="width: 600px; font-family: monospace" rows="10" data-bind="value: value, css: {'gw-error': error}" name="at_cmd_in" wrap="off"></textarea>
					</div>
				<!-- /ko -->
			</td>
		</tr>
		<tr><td></td><td style="text-align: center">
			<button class="btn" data-bind="click: sendCommands, css: {'btn-primary': at_cmd_in.valid}">Send Commands</button>
		</td></tr>
		<tr>
			<td style="text-align: right">
				<span style="display: block; margin-bottom: 10px">Module Output</span>
				<button class="btn btn-danger" name="toggleRaw" data-bind="click: toggleRaw, text: showRaw() ? 'Display Parsed' : 'Display Raw'"></button>
			</td>
			<td style="width: 700px">
				<div style="text-align: center; margin-top: 10px">
					<textarea readonly style="width: 600px; font-family: monospace" rows="18" data-bind="value: at_cmd_out" name="at_cmd_out" wrap="off"></textarea>
				</div>
			</td>
		</tr>
	</tbody>
</div>
<div id="atcmd-help" data-backdrop="static" class="modal hide" tabindex="-1">
	<div class="modal-header">
		<button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
		<h3>AT Command Interface</h3>
	</div>
	<div class="modal-body" style="text-align: center">
		<p style="text-align: center">This interface provides a simple way to directly query the cell module using AT commands.</p>
		<p style="text-align: center">You can run multiple queries at once by putting a list of commands in the <b>Command List</b> text box. For example:</p>
		<textarea readonly style="width: 300px; font-family: monospace" rows="3" data-bind="text: helpSampleCommands"></textarea>
	</div>
</div>
