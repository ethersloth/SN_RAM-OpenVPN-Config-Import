<form id="factorydflreboot-form" class="form-horizontal">
  <table style="width: 100%;">
    <tr>
       <td style="text-align: center; vertical-align: middle;">
            <h3>Restore Factory Default / Reboot System</h3>
       </td>
    </tr>
  </table>   

  <span><hr/></span>

  <table style="width: 100%;">
      <tr>
          <td style="text-align: center">
               <h4><u>Restore Factory Default</u></h4><br />
          </td>
      </tr> 
  </table>   

  <div style="text-align: center; vertical-align: middle;">
      <a class="btn btn-primary" data-bind="click: Restore">Restore</a>
  </div>

  <span><hr/></span>

  <table style="width: 100%;">
      <tr>
          <td style="text-align: center">
               <h4><u>Reboot System</u></h4><br />
          </td>
      </tr> 
  </table>   

  <div style="text-align: center; vertical-align: middle;">
      <a class="btn btn-primary" data-bind="click: Reboot">Reboot</a>
  </div>

  <br/><br/>
</form>
