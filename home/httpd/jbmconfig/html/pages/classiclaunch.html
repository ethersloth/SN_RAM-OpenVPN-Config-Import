<div id="classiclaunch-modal" class="modal hide fade gw-modal-wide" style="margin-top: 15px" tabindex="-1" role="dialog" aria-hidden="true">
	<div id="classiclaunch-carousel" class="carousel slide" data-interval="false" data-pause="false">
		<div class="carousel-inner">
   			<div class="item active">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
					<h3>Classic View Deprecated Alert</h3>
				</div>
				<div class="gw-modal-body-long">
					<div style="text-align: center; vertical-align: middle;">
						<span>Classic View is deprecated and may be removed in future versions.</span>
					</div>
					<a class="btn btn-primary pull-right" data-bind="click: continueAlert">Continue</a>
				</div>
			</div>
		</div>
	</div>
</div>
