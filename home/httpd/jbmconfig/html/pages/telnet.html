<form id="telnet-form" class="form-horizontal">
	<table style="width: 100%"><tr><td style="text-align: center; vertical-align: middle">
		<h3>Telnet TCP Socket Test</h3>
	 </td></tr></table>

	<span><hr /></span>

	<div data-bind="template: {name: 'text-template', data: hostip}"></div>
	<div data-bind="template: {name: 'text-template', data: sport}"></div>

	<div data-bind="visible: haveResult">
		<div class="control-group">
			<div class="controls">
				<span class="field">
					<textarea readonly style="width: 90%; font-family: monospace" rows="10" data-bind="value: result" name="result" wrap="off"></textarea>
				</span>
			</div>
		</div>
	</div>

</form>
