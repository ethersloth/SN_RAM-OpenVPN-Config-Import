<!--ko if: haveStatus-->
	<table class="gw-auto-margin gw-status-table gw-st45" style="width: 475px">
		<tr>
			<td>Current Client Status</td>
			<td data-bind="text: clientstatus"></td>
		</tr>
		<tr>
			<td>Next Check In</td>
			<td data-bind="text: checkin"></td>
		</tr>
		<tr>
			<td>Reporting To</td>
			<td data-bind="text: report"></td>
		</tr>
		<tr>
			<td colspan="2" style="text-align: center; padding-top: 10px"><strong><u>Last Check In:</u></strong></td>
		</tr>
		<tr>
			<td colspan="2" style="text-align: center; font-weight: normal" data-bind="text: lastchk1"></td>
		</tr>
		<tr>
			<td colspan="2" style="text-align: center; font-weight: normal" data-bind="text: lastchk2"></td>
		</tr>
	</table>
	<div class="gw-row" style="margin-top: 10px">
		<button class="btn" data-bind="click: getStatus">Refresh</button>
		<button class="btn" data-bind="click: checkInNow">Check-In Now</button>
	</div>
