<div id="eth1confirm" data-backdrop="static" data-keyboard="false" class="modal hide" tabindex="-1" role="dialog" aria-hidden="true">
	<div class="carousel slide" data-interval="false" data-pause="false">
		<div class="carousel-inner">
			<div class="item active">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal" aria-hidden="true" data-bind="click: exit">&times;</button>
					<h3>Apply Recommendation</h3>
				</div>
				<div class="modal-body">
					<table style="width: 100%;">
						<tr>
							<td><span data-bind="text: applyresult"></span></td>
						</tr>
						<tr>
							<td><span data-bind="html: choices"></span></td>
						</tr>
					</table>
					<a class="btn btn-primary pull-right" data-bind="click: Continue">Continue</a>
					<a class="btn pull-right" data-bind="click: ApplySave">Save</a>
					<a class="btn pull-right" data-bind="click: Cancel">Revert</a>
				</div>
			</div>
		</div>
	</div>
</div>
