<form id="event-form" class="form-horizontal">
	<div class="gw-rounded-border" style="position: fixed; background-color: lightblue; z-index: 100; left: 10px; top: 55px" data-bind="draggable: true">
		<table class="gw-status-table gw-st40" style="width: 200px">
			<tr>
				<td style="text-align: center"data-bind="text: basedReg() + ' Based Addressing'"></td>
			</tr>
		</table>
	</div>
	<!--ko template: {name:'title-template',data:'Events'}--><!--/ko-->
	<!--ko template: {name:'full-savable-bool-template',data: enableevents}--><!--/ko-->
	<div data-bind="visible: isEnabled">
		<hr />
		<div style="text-align: center" data-bind="ifnot: showStatus">
			<div style="text-align: center; vertical-align: middle;">
				<span><font color="#FF0000"><b>No Events Configured</b></font></span>
			</div>
		</div>
		<div data-bind="if: showStatus">
			<!--ko template: {name:'h4-template',data:'Status'}--><!--/ko-->
			<table border="1" align="center" style="text-align: center">
				<thead>
					<tr>
						<th style="width: 70px">Event</th>
						<th style="width: 200px;">Name</th>
						<th style="width: 200px;">Condition</th>
						<th style="width: 200px;">Last Active</th>
						<th style="width: 200px;">Duration</th>
						<th style="width: 65px;">Clear Alarm</th>
					</tr>
				</thead>
				<tbody data-bind="foreach: eventsStatus">
					<tr style="height: 35px; background-color: lightgrey">
						<td style="text-align: center; background-color: white" data-bind="text: ($index() + 1)"></td>
						<td style="text-align: center">
							<span data-bind="text: Name"></span>
						</td>
						<td style="text-align: center" data-bind="css: {'gw-highlight': Highlight}, attr: {title: Title}, style: {'background-color': Color}">
							<span data-bind="html: Status, style: {'color': textColor}"></span>
						</td>
						<td style="text-align: center">
							<span data-bind="text: LastActive"></span>
						</td>
						<td style="text-align: center">
							<span data-bind="text: Duration"></span>
						</td>
						<td style="text-align: center">
							<button class="btn btn-primary" data-bind="click: $parent.clearStatus($index()), visible: AlarmReset === 'manual' && Status === 'Active'">Clear</button>
							<span data-bind="visible: AlarmReset === 'automatic' && Status !== 'Disabled'">Auto</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
		<br />
		<div style="text-align: center">
			<button type="button" class="btn btn-primary" data-bind="click: getupdate">Update Status</button>
		</div>
		<hr />
		<div style="text-align: center">
			<button type="button" class="btn btn-primary" data-bind="click: easyRebootAlert">Add Reboot Alert</button>
			<button type="button" class="btn btn-primary" data-bind="click: easyUsageAlert">Add Data Usage Alert</button>
		</div>
		<!--ko template: {name:'h4-template',data:'Configuration'}--><!--/ko-->
		<!--ko template: {name: 'table-template', data: eventTable}--><!--/ko-->
		<div style="text-align: center; padding-bottom: 10px">
			<button class="btn btn-primary"><a href="#!/tags" style="color: white; text-decoration: none">View Tags</a></button>
		</div>
		<div class="control-group" style="width: 960px; text-align: center">
			<div class="controls">
				<div class="input-append">
					<button type="button" class="btn btn-primary" data-bind="click: geteventslog">View Events Log</button>
					<a tabindex="-1" data-bind="help: {'title': 'Events Log Format', 'link': '/h_event_logformat.html'}" class="btn"><i class="icon-question-sign"></i></a>
				</div>
			</div>
		</div>
		<!-- ko if: showEventsLog -->
			<!--ko template: {name:'h4-template',data:'Events Log Result'}--><!--/ko-->
			<!--ko template: {name: 'textarea-template-ro', data: eventslog}--><!--/ko-->
		<!-- /ko -->
	</div>
</form>
