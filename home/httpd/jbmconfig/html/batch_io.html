<body>
<script type="text/javascript">

  // # TODO: Add tagging information to the display and (possibly) a method
  // #       to change the tags.

var ioRanges = new Array();   // Contains the types and ranges to be monitored.
var editing = 0;              // flag if we are editing a cell (have focus)
var timerSec = 5;             // Global refresh interval
var timerEn  = 1;             // Whether to ignore timer events (editing a cell)
var removed = 0;              // true if we are removing an ioRange.
var timer = 0;                // This will contain the global timer ID.
var messages = new Array();   // Object to store our messages.
var aintotal = 10000;
var aouttotal = 10000;
var lintotal = 3000;
var louttotal = 3000;


// The indexes of this array are the numbers used by the I/O DB for that type
var ioTypes =
    [
     ["ANALOG INPUTS","AI"],
     ["ANALOG OUTPUTS","AO"],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["DISCRETE INPUTS","DI"],
     ["DISCRETE OUTPUTS","DO"],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["",""],
     ["LONG INPUTS","LI"],
     ["LONG OUTPUTS","LO"],
     ["FLOAT INPUTS","FI"],
     ["FLOAT OUTPUTS","FO"]
];


/**
 * Main timer function that decides whether to update values or display 
 * a message based on the state of the web page and user interaction.
 *
 */
function doTimer()
{
    var timerMS = timerSec * 1000;

    if (removed) {
        DisplayMessage("Waiting for I/O before removing range", "trace");
    }
    else if (editing) {
        DisplayMessage("Pausing I/O updates while editing cells",
                       "trace");
    }
    else if (timerEn && (timerSec > 0) && (ioRanges.length > 0)) {
        DisplayMessage("I/O updates continuing", "trace");
        UpdateIORanges();
    }

    timer = setTimeout("doTimer()", timerMS);
}

/**
 * Update timer interval and give feedback to user.
 *
 * @param[in] scanrate.  The new scan rate given in seconds.
 *
 */
function UpdateScanrate(scanrate) 
{
    timerSec = scanrate;
    DisplayMessage("Scan Rate changed to <b>" + scanrate + 
                   "</b> second(s)", "trace");
    //Refresh();
}

/**
 * Update the I/O values and reset the timer
 *
 */
function Refresh()
{
    clearTimeout(timer);
    UpdateIORanges();
    timer = setTimeout("doTimer()", timerSec*1000);
}

function GetRegTotals()
{
	var ajax = GetXmlHttpObject();

	if (ajax == null) {
		DisplayMessage("Browser does not support HTTP Request","alert");
	}
	else {
		var url="/cgi-bin/getiodbstarts.cgi";

		ajax.onreadystatechange = function ()
		{
			if (ajax.readyState == 4) {
				var jsonRes = JSON.parse(ajax.responseText);
				if (! jsonRes.error) {
					aintotal = jsonRes.ain;
					aouttotal = jsonRes.aout;
					lintotal = jsonRes.lin;
					louttotal = jsonRes.lout;
				}
			}
		}
		ajax.open("GET", url, true);
		ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
		ajax.send();
	}
}

/**
 * For each displayed I/O Range, update its values. The main timer is disabled 
 * during this operation and is reenabled after all values have been processed.
 *
 */
function UpdateIORanges()
{
    // Bail if we are removing an I/O range.
    if (!removed) {
        // We don't want to deal with another timer event until we have all IO
        timerEn = 0;

        var ajax = GetXmlHttpObject();

        if (ajax == null) {
            DisplayMessage("Browser does not support HTTP Request","alert");
        }
        else {
            var url="/cgi-bin/batch_io.cgi";
            var params = "";

            for (var i = 0; i < ioRanges.length; i++) {

                if (0 != i) {
                    params = params + "&";
                }

                if (10 > i) {
                    params = params + "t0" + i + "=" + ioRanges[i].type;
                    params = params + "&a0" + i + "=" + ioRanges[i].addr;
                    params = params + "&n0" + i + "=" + ioRanges[i].numregs;
                }
                else {
                    params = params + "t" + i + "=" + ioRanges[i].type;
                    params = params + "&a" + i + "=" + ioRanges[i].addr;
                    params = params + "&n" + i + "=" + ioRanges[i].numregs;
                }

                //ioRanges[i].regData = new Array();
            }

            ajax.onreadystatechange = function() 
            {
                ProcessAjaxJson(ajax);
            }
            ajax.open("POST", url, true);
            ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
            ajax.send(params);
        }
    }
}

/**
 * Callback function to parse the cgi response. The cgi returns
 * a JSON array of arrays for each range.
 *
 * @param[in] ajax  container containing ajax response
 *
 */

function ProcessAjaxJson(ajax)
{
    if (ajax.readyState == 4) {
        try {
            var res = ajax.responseText;
            var jsonRes = JSON.parse(res);

            for (var i = 0; i < jsonRes.length; i++) {
                ioRanges[i].regData = jsonRes[i];
            }
        }
        catch (e) {
            DisplayMessage("Caught bad response, will update in " + timerSec + " seconds.","alert");
            var badRange = ioRanges.length-1;
            ioRanges[badRange].regData = new Array();
            for (var i = 0; i < ioRanges[badRange].numregs; i++) {
                ioRanges[badRange].regData[i] = "n";
            }
        }
            
        DisplayIOValues();
        timerEn = 1;
    }
}

/**
 * Write a value to a specific offset in one of the I/O ranges using an fast 
 * cgi query and processing the results in a callback function. Errors will 
 * be displayed in the message area. After the ajax callback has finished 
 * processing the results, all of the I/O ranges will be updated. 
 *
 * @param[in] ioNum   The specific I/O range we are going to update a value in.
 *                    This value is an index to the array of all I/O ranges and 
 *                    their associated data.
 * @param[in] i       The offset of the register in the I/O range.
 * @param[in] value   The new value to be written to the register 
 *
 */
function SetIOValue(ioNum, i, value)
{
    var type = ioRanges[ioNum].type;
    var addr = Number(ioRanges[ioNum].addr) + Number(i);

    var Set_xmlHttp = GetXmlHttpObject();

    if (Set_xmlHttp == null) {
        alert("Browser does not support HTTP Request");
    }
    else {
        var url="/cgi-bin/test_io.cgi";
        url= url + "?func=1"
            url= url + "&type="    + type;
        url= url + "&addr="    + addr;
        url= url + "&numregs=1";
        url= url + "&values=" + value;

        timerEn = 0;

        Set_xmlHttp.onreadystatechange = function() 
        {
            if (Set_xmlHttp.readyState == 4) {
                if (Set_xmlHttp.responseText.indexOf("Error=") > -1) {
                    DisplayMessage(Set_xmlHttp.responseText, "alert");
                } 
                else {
                    DisplayMessage("Successfully wrote <b>'" + 
                                   Number(value) + 
                                   "'</b> to I/O register <b>"+ 
                                   ioTypes[type][1] + "[" + addr + "]");
                }
                Refresh();
            }
        }
        Set_xmlHttp.open("GET", url, true);
        Set_xmlHttp.send(null);
    }
}

/**
 * Set the html table values to the corresponding values contained in 
 * each I/O range. If a cell is being editing, skip updating that cell, 
 * and make sure its contents are selected and focused after the process 
 * is compelte. 
 *
 */
function DisplayIOValues()
{
    for (var i = 0; i < ioRanges.length; i++) {
        for (var j = 0; j < ioRanges[i].regData.length; j++) {
            var ioAddr = Number(ioRanges[i].addr) + j;
            var elementID = "ioRange" + i + "Val" + ioAddr;

            if (elementID != editing) {
                var ioBox = document.getElementById(elementID);
                ioBox.value = Number(ioRanges[i].regData[j]);
            }
        }
    }

    // This bit enables brisk tab-edit-tab-edit etc.
    if (editing) {
        var cell = document.getElementById(editing);
        cell.select();
    }

}


/**
 * Generates HTML tables for all the configured I/O ranges and replaces the
 * contents of the iodata div with it.
 *
 */
function BuildIOTables()
{
    var ioTables = "";

    for (var i=0; i < ioRanges.length; i++) {
        var type = ioRanges[i].type;

        ioRanges[i].ioTable = "<div style=\"float:left;\"><table id=ioRange" + i + " class=ioRange>" +
            "<TH class=rangeHead colspan=2><input type=button value=\"X\"" +
            "onclick=\"RemIORange(" + i + ")\"/>  " + ioTypes[type][0] +
            "</TH>";

        BuildIOTable(i);

        ioRanges[i].ioTable = ioRanges[i].ioTable + "</table></div>";
        ioTables = ioTables + ioRanges[i].ioTable;// + "<hr class=rangeSep />";
    }

    var myDoc=document.getElementById("iodata");
    myDoc.innerHTML = ioTables;
}

function zeropad(n, width) {
	n = n + '';
	return n.length >= width ? n : new Array(width - n.length + 1).join('0') + n;
}

/**
 * Builds the HTML for a single I/O range. Each I/O value is represented by two
 * cells. One for the address (and in the future tag name), and one for the 
 * value (currently unscaled). The value is contained in an editable text input 
 * field to enable real-time editing of values. 'focus' and 'onchange' 
 * attributes are used to accomplish this. 
 *
 * @param[in] ioNum   The specific I/O range we are building a table for. This
 *                    value is an index to the array of all I/O ranges and their
 *                    associated data.
 */
function BuildIOTable(ioNum)
{
    var type = ioRanges[ioNum].type;
    var addr = ioRanges[ioNum].addr;
    var numregs = ioRanges[ioNum].numregs;
    var cols = ioRanges[ioNum].cols;
    var ioTable = "";

    for (var i = 0; i < numregs; i++) {
        var myaddr = Number(addr) + i;
        var valueID = "ioRange" + ioNum + "Val" + myaddr; 
        var value = "";

        if (ioRanges[ioNum].regData) {
            value = Number(ioRanges[ioNum].regData[i]);
        }

        /*
        if ((i % cols) == 0) {
            // Odd Rows get a special flag.
            if ((i % (cols * 2)) != 0) {
                ioTable = ioTable + "<TR class=oddRow>";
            }
            else {
                ioTable = ioTable + "<TR>";
            }
        }
        */

		var labl = ioTypes[type][1] + myaddr;
		var addrmod = myaddr * 2;
		switch(ioTypes[type][1]) {
		case "DI":
			labl = labl + ", 1:" + zeropad(myaddr + 1, 4);
			break;
		case "DO":
			labl = labl + ", 0:" + zeropad(myaddr + 1, 4);
			break;
		case "AI":
			labl = labl + ", 3:" + zeropad(myaddr + 1, 4);
			break;
		case "AO":
			labl = labl + ", 4:" + zeropad(myaddr + 1, 4);
			break;
		case "LI":
			addrmod += aintotal + 1;
			labl = labl + ", 3:" + zeropad(addrmod, 4);
			break;
		case "LO":
			addrmod += aouttotal + 1;
			labl = labl + ", 4:" + zeropad(addrmod, 4);
			break;
		case "FI":
			addrmod += aintotal + lintotal + 1;
			labl = labl + ", 3:" + zeropad(addrmod, 4);
			break;
		case "FO":
			addrmod += aouttotal + louttotal + 1;
			labl = labl + ", 4:" + zeropad(addrmod, 4);
			break;
		}
        ioTable = ioTable + "<tr><TD id=ioRange" + ioNum + "Addr" + myaddr +
            " class=ioAddr><B>(" + labl + ")</B></TD>";

        // This is where the magic happens.
        // When input box is focused, disable timer with editing=1
        // When the value is changed, commit the change.
        ioTable = ioTable +
            "<TD class=ioVal><input class=io type=\"text\" id=" + valueID +
            " size=12 onFocus=\"editing='" + valueID + "';\"" + 
            " onBlur=\"editing=0;\"" + 
            " onchange=\"SetIOValue(" + ioNum + "," + i + ",this.value);\"" + 
            " value=\"" + value + "\" onClick=\"this.select()\"/></TD></tr>";
    }
    //ioTable = ioTable + "</TR></Table></div>";

    ioRanges[ioNum].ioTable = ioRanges[ioNum].ioTable + ioTable;
}

/**
 * Remove an I/O range from the display. If there is no current updating of I/O
 * values, remove the I/O range from ioRanges list and rebuild the HTML for all
 * ranges; otherwise, wait for ajax to finish.
 *
 * @param[in] ioNum   the specific I/O range we are going to remove. This
 *                    value is an index to the array of all I/O ranges and their
 *                    associated data.
 */
function RemIORange(ioNum)
{
    removed = 1;

    // Wait until all the current ajax stuff is finished
    if (timerEn == 0) {
        setTimeout(function () 
        {
            RemIORange(ioNum);
        }, 100);
    } 
    else {
        type = ioRanges[ioNum].type;
        addr = ioRanges[ioNum].addr;
        endAddr = Number(ioRanges[ioNum].addr) +
            Number(ioRanges[ioNum].numregs) - 1;

        ioRanges.splice(ioNum,1);

        if (ioRanges.length == 0) {
            var myDoc = document.getElementById("iodata");
            myDoc.innerHTML = " ";
        }

        BuildIOTables();
        removed = 0;
        DisplayMessage("Removed I/O Range <b>" + ioTypes[type][1] + "[" +
                       addr + ":" + endAddr + "]</b> from Test I/O");
    }
}

/**
 * Add an I/O range to the Test I/O web page. If the I/O Range is not already
 * being displayed, add it to the list, then regenerate HTML and update values.
 *
 * @param[in] type     The numerical value of the type corresponding to analog, 
 *                     discrete, long, and float, and either input or output.
 *                     The numbers for these values are the indexes of the 
 *                     ioTypes global array.
 * @param[in] addr     The starting address of the I/O range
 * @param[in] numregs  The number of registers to display for this I/O range
 * @param[in] cols     The number of columns to use for the HTML table
 *                     displaying this I/O range
 */
function AddIORange(type, addr, numregs)
{
    if (type == -1) {
        DisplayMessage("Type not selected","alert");
    }
    else if (addr.length == 0) {
        DisplayMessage("Addr not entered","alert");
    }
    else if (numregs.length == 0) {
        DisplayMessage("Number of registers not entered","alert");
    }
    else {
        // Feedback
        var endAddr = Number(addr) + Number(numregs) - 1;

        // make sure we don't add the same range twice
        // Avoid timer stuff while building up the new io range.
        var found = 0;
        for (var i = 0; i < ioRanges.length; i++) {
            if ((ioRanges[i].type == type) && (ioRanges[i].addr == addr) &&
                (ioRanges[i].numregs == numregs) && !found) {

                found = 1;
                DisplayMessage("Error adding I/O Range: <b>" + 
                               ioTypes[type][1] + "[" + addr +
                               ":" + endAddr + "]</b> is already displayed",
                               "alert");
            }
        }

        if (!found) {
            DisplayMessage("Added I/O Range <b>" + ioTypes[type][1] + "[" + 
                           addr + ":" + endAddr+"]</b> to Test I/O");
            timerEn = 0;
            ioRanges[ioRanges.length]
                = {type: type, addr: addr , numregs: numregs};
            BuildIOTables();
            Refresh();
        }
    }
}

/**
 * A wrapper function for generating a new Ajax object depending on the client's
 * browser type and capabilities.
 * 
 * @param[out] objXMLHttp   The xml http request object used for asynchronous 
 *                          queries to the fast cgi server.
 *
 */
function GetXmlHttpObject()
{
    var objXMLHttp = null;

    if (window.XMLHttpRequest) {
        objXMLHttp = new XMLHttpRequest();
    }
    else if (window.ActiveXObject) {
        objXMLHttp = new ActiveXObject("Microsoft.XMLHTTP");
    }

    return objXMLHttp;
}

/**
 * Display or Hide the messages div depending on the value of an input checkbox
 *
 * @param[in] show    whether to display the message area or not.
 *
 */
function ShowMessages(show)
{
    var msgArea = document.getElementById("messages");
    var ioArea = document.getElementById("iodata");

    if (show) {
        msgArea.style.display = "block";
        msgArea.scrollTop = msgArea.scrollHeight;
    }
    else {
        msgArea.style.display = "none";
    }
}

/**
 * Add a message to the message area with a given severity. The message will 
 * be wrapped in a div with the class equal to the severity string. If the
 * message is the same as the most recent message, don't display it.
 *
 * @param[in] message    The message to be displayed to the user
 * @param[in] severity   The string which determines the div class for the
 *                       message. This div class can be styled with a 
 *                       CSS section.
 *
 */
function DisplayMessage(message, severity)
{
    var msgArea=document.getElementById("messages");
    var HTML = "<div class=" + severity + ">" + message + "</div>";
    var msgCnt = messages.length;

    // Don't Display the message if it is equal to the previous one
    if ((msgCnt == 0) || (messages[msgCnt-1].html.indexOf(message) == -1)) {
        messages[msgCnt] = new Object();
        messages[msgCnt].html = HTML;
        msgArea.innerHTML += messages[msgCnt].html;
        msgArea.scrollTop = msgArea.scrollHeight;
    }
}

// Fetch starts for long input/output
GetRegTotals();
// Allow for html to load before starting timer
setTimeout("doTimer()", 1000);
</script>
