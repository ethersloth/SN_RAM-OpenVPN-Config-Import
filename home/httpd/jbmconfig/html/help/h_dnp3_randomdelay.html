<h4>Description</h4>
<p><b>Maximum Random Delay:</b> This value is used for backoff_time described in below note.</p>
<p>
<b>Note:</b> If a device prepares to transmit and finds the link busy, it waits until it is no longer busy, then waits a backoff_time as follows:
</p>
<p>
backoff_time = fixed_delay + random( max_random_delay )
</p>
