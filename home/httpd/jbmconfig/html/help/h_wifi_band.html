<h4>Description</h4>
<p>
This determines the wireless standard to use (802.11b/g/n). Channel 14
is only permitted in 802.11b mode. If available in your region, use 802.11b to
enable channel 14.
</p>
<h4>Recommended</h4>
<p>
802.11g/n for best performance
</p>
<p>
802.11b/g for best compatibility with older clients
</p>
