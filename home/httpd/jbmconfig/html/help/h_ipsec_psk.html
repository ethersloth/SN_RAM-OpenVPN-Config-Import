<h4>Description</h4>
<p>
 Specify the key to be exchanged for encryption negotiation during phase 1 (IKE). Key must not contain a double-quote character.
 <br /><br />
 <font color="#FF0000">(Required)</font>
</p>
<p>
 <b>Note:</b> The Pre-Shared Key must match on both ends of the tunnel in order to work.
