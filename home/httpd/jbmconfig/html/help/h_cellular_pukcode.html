<h4>Description</h4>
<p>Enter An 8 digit PUK code obtained from the SIM carrier which is required to unlock a SIM when an incorrect SIM pin has been entered too many times.<br /><br />
<font color="#FF0000"><b>Warning:</b></font> If an incorrect PUK code is entered too many times, the SIM will become unusable and will require replacement by the carrier.<br />
</p>
