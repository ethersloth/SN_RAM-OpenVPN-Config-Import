<h4>Description</h4>
<p>Enter the password required for the selected incoming number to access the SMS handler system.</p>
<p><b>Note:</b> The password may be alphanumeric, minimum 4 to maximum 20 alphanumeric characters including the following special characters <b>`~!@#$%^&*()_-=+[]{}\|\\:;,<.>/?</b>.</p>
