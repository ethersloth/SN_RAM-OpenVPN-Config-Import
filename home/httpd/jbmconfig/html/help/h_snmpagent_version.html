<h4>Description</h4>
<p>Select the desire SNMP version for the device SNMP agent.
</p>
<p><b>SNMP v1/v2c:</b> Provides a community string sent in plaintext with no authentication or privacy.</p>
<p><b>SNMP v3:</b> Provides both authentication and privacy, which can be used together or separately.</p>
