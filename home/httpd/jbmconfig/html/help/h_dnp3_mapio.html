<h4>Description</h4>
<p>
<b>Map I/O Button:</b> When clicking on this link a new window appears. This new window is used to configure and map every DNP point to a specific I/O.
</p>
<p>
<b>Important Note:</b> Each type of I/O must have  its corresponding Object Mapping Window opened at least once, or else the I/O won't be mapped.
</p>
