<h4>Description</h4>
<p>Choose an interface that will be forwarded to a DMZ Host. All incoming packets (TCP/UDP/ICMP/etc) will be forwarded to the DMZ Host specified. <font color="#FF0000">(Required)</font></p>
<p><b>Note:</b> Host Redirect and Service Access rules will apply first, and may prevent certain ports from reaching the DMZ Host.</p>
