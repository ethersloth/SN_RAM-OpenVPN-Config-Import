<h4>Description</h4>
<p>Specifies the protocol version for SSH Server to use. <font color="#FF0000">(Required)</font><br /></p>
<p><b>Note:</b> Security flaws have been found in SSH protocol version 1. For that reason, we recommend using protocol version 2 where possible.</p>
<h4>Recommended Setting</h4>
<p>Version 2</p>
