<h4>Description</h4>
<p>
To convert from an input register range of 4000-32768 to an output range of 0-100, the values would be set as:<br /><br />
Start of Input Range = <b>4000</b><br />
End of Input Range = <b>32768</b><br />
Start of Output Range = <b>0</b><br />
End of Output Range = <b>100</b><br />
</p>
