<h4>Description</h4>
<p>Select <b>Yes</b> to allow any Out-of-Band ports to be redirected locally to this device. 
When enabled, the OOB Ports specified in the Advanced->Out-of-Band Mgt section will be automatically allowed.
</p>
<h4>Recommended Setting</h4>
<p>Yes - When also configuring <b>Out-of-Band Mgt</b> on this unit.</p>
