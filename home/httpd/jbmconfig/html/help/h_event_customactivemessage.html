<h4>Description</h4>
<p>
<b>SMS Message:</b> Enter a custom message when event goes active to be sent to the recipient(s). If appended to a standard message, the length is limited to 60 characters.
</p>
<p>
<b>Email Message:</b> Enter a custom message body that will be sent to the Recipient(s) when the event goes active.
</p>
