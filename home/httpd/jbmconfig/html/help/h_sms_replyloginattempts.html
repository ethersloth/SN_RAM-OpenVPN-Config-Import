<h4>Description</h4>
<p>This option determines when the device will respond to invalid login attempts.</p>
<p><b>Available Options</b><br /><br />
<b>Yes:</B> Respond to ALL invalid login attempts<br /><br />
<b>Ignore non-whitelist numbers:</b> Respond only to numbers that are on the whitelist, ignore all others<br /></p>
