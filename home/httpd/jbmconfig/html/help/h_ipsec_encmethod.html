<h4>Description</h4>
<p>Specify how the two end-points for this tunnel should authenticate with each other.
Current options are <b>Pre-Shared Key</b> and <b>X.509 Certificates</b>.  
You may select certificates only after they are loaded in the <br /><b>Admin->Certificate Manager</b>. <font color="#FF0000">(Required)</font></p>
