<h4>Description</h4>
<p>Select the Authentication Type you desire to have for the configured SNMPv3 user. This option is required for SNMPv3 functionality.<br /><br />
<b>None:</b> No authorization and no privacy, basically no security at all.<br />
<b>MD5:</b> Insecure message digest algorithm.<br />
<b>SHA:</b> Secure hash algorithm.
</p>
