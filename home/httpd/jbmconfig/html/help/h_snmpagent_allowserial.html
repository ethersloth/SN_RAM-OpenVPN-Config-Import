<h4>Description</h4>
<p>Select <b>Yes</b> to allow users and management systems to retrieve the unit serial number from the SNMP Agent. If <b>No</b> is selected, a query of the serial number OID will return <b>UNKNOWN</b>. <font color="#FF0000">(Required)</font></p>
