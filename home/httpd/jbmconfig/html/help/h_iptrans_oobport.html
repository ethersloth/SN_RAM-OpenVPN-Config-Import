<h4>Description</h4>
<p>Enter the IP Port number to be used for Out-of-Band port redirection when the Out-of-Band local Port Re-direct mode has been 
enabled. <font color="#FF0000">(Required)</font></p>
<h4>Recommended Setting</h4>
<p>This port must match the configured port in <b>Out-of-Band Mgt</b> setup.</p>
