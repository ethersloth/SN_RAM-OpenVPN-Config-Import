<h4>Description</h4>
<p>
 Select <u>Yes</u> to allow the interface to obtain DNS Server settings via DHCP.
 <br /><br />
 This field is only available when <b>Obtain Network Addresses via DHCP</b> has been set to <u>Yes</u>.
 <br /><br />
 Select <u>No</u> to allow the interface to use the DNS settings from the <b>Network&#8594;DNS Settings</b> screen.
</p>
<h4>Recommended Setting</h4>
<p>
 Yes
</p>
