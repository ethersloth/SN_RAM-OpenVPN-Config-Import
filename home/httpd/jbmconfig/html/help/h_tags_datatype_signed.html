<p>Interpret register values as signed or unsigned. Affects range of possible values.</p>
<b>Unsigned: </b> <pre style="display: inline-block">0 to 2<sup>size</sup></pre>
<br />
<b>Signed: </b> <pre style="display: inline-block">-2<sup>size-1</sup> to 2<sup>size-1</sup>-1</pre>
<br />
<p>Signed values will be stored using 2's complement</p>
