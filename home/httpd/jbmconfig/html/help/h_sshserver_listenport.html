<h4>Description</h4>
<p>Specifies the local IP port on which the SSH server will accept connections. <font color="#FF0000">(Required)</font><br /></p>
<p><b>Note:</b> Specifying a value other than <b>22</b> will require proper firewall rules in order to allow connections to the given port.</p>
<h4>Recommended Setting</h4>
<p>22</p>
