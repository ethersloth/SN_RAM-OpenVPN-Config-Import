<h4>Description</h4>
<p>
 Specify the community string to use for authentication between the SNMP Agent and Manager. Alpha-numeric strings are supported.
 <br /><br />
 <font color="#FF0000">(Required)</font>
</p>
<p>
 <b>Note: The community string must match on both ends of the connection in order to work.</b>
