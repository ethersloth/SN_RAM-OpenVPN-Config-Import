<h4>Description</h4>
<p>Select when to publish the IODB values.<br /><br />
<b>Publish Interval Only</b> - publish the IODB values will happen only at set publish interval.<br />
<b>IODB value changed</b> - Publish the IODB values when they have changed. If no values change, publishing will happen no less than publish interval.<br />
</p>
