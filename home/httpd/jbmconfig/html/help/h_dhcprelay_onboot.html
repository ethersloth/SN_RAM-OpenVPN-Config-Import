<h4>Description</h4>
<p>
 Select <u>Yes</u> to enable the DHCP Relay at boot time, or <u>No</u> for manual control.
 <br /><br />
 If the DHCP Relay service is required to be operational at all times, then set to <u>Yes</u>.
 If another process, such as VRRP, is going to dynamically enable/disable DHCP Relay service as
 needed, then set to <u>No</u>
</p>
