<h4>Description</h4>
<p>Enter MR Home IP Address - a /32 IPv4 address programmed into the MR configuration and used by the MR as a source of all NEMO signaling.<br />
This will be the IP of the MR GRE endpoint and does not need to be different on every device.
</p>
<h4>Recommended Setting</h4>
<p>1.2.3.4</p>
