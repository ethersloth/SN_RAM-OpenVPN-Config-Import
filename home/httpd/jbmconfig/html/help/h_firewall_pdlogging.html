<h4>Description</h4>
<p>This option controls the logging level of common packet drops. These messages normally appear in syslog. The rate options are as follows:<br /><br />
<b>Normal: </b>2 messages per second max<br />
<b>Quieter: </b>10 messages per minute max<br />
<b>Silent: </b>No messages are logged<br />
</p>
