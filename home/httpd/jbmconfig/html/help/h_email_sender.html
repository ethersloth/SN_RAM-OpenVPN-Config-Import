<h4>Description</h4>
<p>Specify a custom <b>From</b> address. Your SMTP server may or may not display this. (Optional)<br /><br />
<b>Note: </b>If the sender field is left <b>BLANK</b>, the username will be used as the <b>from</b> address.<br />
</p>
<h4>Recommended Setting</h4>
<p>The account email address should be used, or leave blank.</p>
