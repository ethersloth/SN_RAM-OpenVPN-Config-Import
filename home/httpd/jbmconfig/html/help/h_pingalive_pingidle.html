<h4>Description</h4>
<p>Select the name of the interface which the ping alive service will monitor for activity.  This service will send a ping <b>ONLY</b> when the connection for the selected interface is idle or reset.</p>
<p><b>Note: </b>If <b>None</b> selected, this functionality is disabled.</p>
<h4>Recommended Setting</h4>
<p>None</p>
