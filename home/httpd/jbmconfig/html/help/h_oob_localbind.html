<h4>Description</h4>
<p>Select <b>Yes</b> to enable Local Binding.</p>
<h4>Recommended Setting</h4>
<p>
 Local binding will prevent remote access to this port.  
 You will be required to Telnet/SSH to the unit's command line, and then telnet to the OOB port locally 
 (telnet localhost &lt;OOB Port&gt;).
</p>
