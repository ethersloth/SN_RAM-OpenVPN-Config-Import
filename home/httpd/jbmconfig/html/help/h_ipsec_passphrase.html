<h4>Description</h4>
<p>
 Specify the passphrase (or password) required to load the client certificate's key. This passphrase must not contain a double-quote character.
 <br /><br />
 <font color="#FF0000">(Required)</font>
</p>
<p>
 <b>Note:</b> The passphrase (or password) is usually set at the time the key is generated.
</p>
