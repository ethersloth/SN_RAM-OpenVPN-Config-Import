<h4>Description</h4>
<p>Specify whether you want to forward IPSec packets to the DMZ Host, or allow <b>this</b> device to respond directly. <font color="#FF0000">(Required)</font></p>
<p><b>Note:</b> If you choose <b>Yes</b>, you will no longer be able to communicate through any configured IPSec tunnels on this device.</p>
