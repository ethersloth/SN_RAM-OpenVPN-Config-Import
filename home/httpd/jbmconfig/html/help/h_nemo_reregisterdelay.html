<h4>Description</h4>
<p>Enter the interval to send re-register (RRQ) packets as long as the HA is responding. If the LIFETIME number received from the HA is less, then that value will be used instead (minus about 30 seconds). The valid values are 60 - 65534.</p>
<h4>Recommended Setting</h4>
<p>600</p>
