<h4>Description</h4>
<p>Select <b>Yes</b> to enable the DMZ Host settings to take effect once the <button>Apply</button> or <button>Save</button> button is clicked. <font color="#FF0000">(Required)</font></p>
<p><b>Note:</b> Enabling DMZ Hosting will negate all configured firewall rules. The firewall and IP Transparency services must be disabled prior to using DMZ Host.</p>
