<h4>Description</h4>
<p>
Modbus station number to use for the remote station.
</p>
<p>
<b>Valid Values: </b>1-247 - values may be duplicated for other station as long as the station can be uniquely addressed by an IP address or is connected on a serial port.
</p>
<b>NOTE: </b><b>0</b> is a broadcast address. <b>248-255</b> are reserved addresses.
