<h4>Description</h4>
<p>
 Specify whether you want to enable the 2nd VRRP service on <b>this</b> device. The service will be started after clicking Apply, 
 and on each subsequent boot.
</p>
<h4>Recommended Setting</h4>
<p>
 VRRP is designed to work with multiple systems.  Enable only if you intend to setup other VRRP partners.
</p>
