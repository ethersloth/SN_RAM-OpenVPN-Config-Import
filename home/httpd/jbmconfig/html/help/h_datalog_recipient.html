<h4>Description</h4>
<p>Enter an email address destination for the logs. Multiple email addresses may be entered by separating them with a <b>comma</b>.<br /><br />
<b>Note:</b> No spaces are allowed in this field.<br>
<b>Notes:</b> The Email Client service must be configured independent from the Datalog before emails can be sent successfully.<br>
</p>
